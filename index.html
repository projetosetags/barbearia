<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BARBEARIA-LEANDRO DAVID-AGENDA</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header class="topo">
<div>
<h1>BARBEARIA LEANDRO DAVID</h1>
<p>Agendamento de corte masculino e barba</p>
</div>
<button onclick="alternarPainel()" id="btnPainel">Painel Proprietário</button>
</header>
<main>
<section id="viewCliente" class="card">
<h2>002 APP DO CLIENTE</h2>
<div class="grid">
<label>Nome<input id="clienteNome" placeholder="Seu nome"></label>
<label>WhatsApp<input id="clienteTelefone" placeholder="(00) 00000-0000"></label>
<label>Serviço<select id="servicoSelect"></select></label>
<label>Barbeiro<select id="barbeiroSelect"></select></label>
<label>Data<input id="dataAgendamento" type="date"></label>
<label>Horário desejado<select id="horaSolicitada"></select></label>
</div>
<button onclick="solicitarAgendamento()" class="principal">Solicitar Agendamento</button>
<div id="retornoCliente" class="retorno"></div>
<h3>003 ACOMPANHAR MEU AGENDAMENTO</h3>
<div class="linhaBusca">
<input id="telefoneBusca" placeholder="Digite seu WhatsApp para acompanhar">
<button onclick="acompanharCliente()">Acompanhar</button>
</div>
<div id="listaCliente"></div>
</section>
<section id="viewProprietario" class="card hidden">
<h2>004 PAINEL DO PROPRIETÁRIO</h2>
<div class="grid kpis">
<div><strong id="kpiAguardando">0</strong><span>Aguardando</span></div>
<div><strong id="kpiAceitos">0</strong><span>Aceitos</span></div>
<div><strong id="kpiAtendimento">0</strong><span>Em atendimento</span></div>
<div><strong id="kpiFinalizados">0</strong><span>Finalizados</span></div>
</div>
<div class="linhaBusca">
<input id="dataPainel" type="date">
<button onclick="carregarPainel()">Atualizar</button>
</div>
<h3>005 SOLICITAÇÕES E FILA DO DIA</h3>
<div id="listaPainel"></div>
<h3>006 AGENDA SEMANAL</h3>
<div id="agendaSemanal"></div>
</section>
<div id="loginAdmin" class="card hidden">
<h2>007 LOGIN ADMINISTRADOR</h2>
<div class="grid">
<label>Login<input id="loginUsuario"></label>
<label>Senha<input id="senhaUsuario" type="password"></label>
</div>
<button onclick="entrarAdmin()" class="principal">Entrar</button>
</div>
</main>
<script src="supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
